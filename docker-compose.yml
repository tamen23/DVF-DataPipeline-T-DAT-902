services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: homepedia-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homepedia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homepedia}
      POSTGRES_DB: ${POSTGRES_DB:-homepedia}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homepedia}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

