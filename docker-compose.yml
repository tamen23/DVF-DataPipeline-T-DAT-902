x-airflow-common: &airflow-common
  build: ./infra/airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "30"
    # connections available to all DAGs
    # JSON form keeps the spark:// scheme inside the host (the URI form would
    # swallow it as the connection type and submit a bare "spark-master:7077")
    AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type": "spark", "host": "spark://spark-master", "port": 7077}'
    AIRFLOW_CONN_HOMEPEDIA_POSTGRES: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    # data lake credentials for ingestion tasks and spark-submit conf
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    LAKE_BUCKET: ${LAKE_BUCKET}
    # serving DB, used by Spark jobs (JDBC) launched from DAGs
    POSTGRES_HOST: postgres
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # DVF years to ingest (comma-separated)
    DVF_YEARS: ${DVF_YEARS:-2024}
  volumes:
    - ./orchestration/dags:/opt/airflow/dags
    - ./ingestion:/opt/airflow/ingestion
    - ./jobs:/opt/airflow/jobs
    - ./warehouse:/opt/airflow/warehouse
    - ./quality:/opt/airflow/quality
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ----------------------------- storage -----------------------------
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${LAKE_BUCKET} &&
      echo 'lake bucket ready'
      "

  # ----------------------------- spark cluster -----------------------------
  spark-master:
    build: ./infra/spark
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "7077:7077"   # cluster endpoint
      - "8081:8080"   # master web UI
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6

  spark-worker-1:
    build: ./infra/spark
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_MEMORY: 1536m
      SPARK_WORKER_CORES: 2
      SPARK_NO_DAEMONIZE: "true"
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8082:8081"   # worker web UI

  spark-worker-2:
    build: ./infra/spark
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_MEMORY: 1536m
      SPARK_WORKER_CORES: 2
      SPARK_NO_DAEMONIZE: "true"
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8083:8081"   # worker web UI

  # ----------------------------- airflow -----------------------------
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname Home --lastname Pedia --role Admin --email admin@homepedia.local
      || true
      "

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ----------------------------- app -----------------------------
  app:
    build: ./app
    volumes:
      - ./app:/app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SPARK_MASTER_UI: http://spark-master:8080
    ports:
      - "8501:8501"
    depends_on:
      - postgres
      - mongo
      - minio
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  airflow_logs:
