services:

  # ── Hadoop HDFS ──────────────────────────────────────────────────
  namenode:
    image: apache/hadoop:3.3.6
    container_name: homepedia-namenode
    hostname: namenode
    command: ["hdfs", "namenode"]
    environment:
      CLUSTER_NAME: homepedia
      HADOOP_HOME: /opt/hadoop
    ports:
      - "9870:9870"   # HDFS Web UI
      - "8020:8020"   # HDFS RPC
    volumes:
      - namenode_data:/opt/hadoop/data/namenode
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro
    healthcheck:
      test: ["CMD", "hdfs", "dfsadmin", "-report"]
      interval: 30s
      timeout: 10s
      retries: 5

  datanode:
    image: apache/hadoop:3.3.6
    container_name: homepedia-datanode
    hostname: datanode
    command: ["hdfs", "datanode"]
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      HADOOP_HOME: /opt/hadoop
    ports:
      - "9864:9864"   # DataNode Web UI
    volumes:
      - datanode_data:/opt/hadoop/data/datanode
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro

  # ── Hive ─────────────────────────────────────────────────────────
  hive-metastore-db:
    image: postgres:16-alpine
    container_name: homepedia-hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - hive_metastore_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: homepedia-hive-metastore
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    command: ["hive", "--service", "metastore"]
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HIVE_METASTORE_DB_URL: jdbc:postgresql://hive-metastore-db:5432/metastore
      HIVE_METASTORE_DB_USER: hive
      HIVE_METASTORE_DB_PASS: hive
      HADOOP_HOME: /opt/hadoop
    ports:
      - "9083:9083"   # Metastore Thrift
    volumes:
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro

  hive-server:
    image: apache/hive:3.1.3
    container_name: homepedia-hive-server
    depends_on:
      - hive-metastore
    command: ["hive", "--service", "hiveserver2"]
    environment:
      SERVICE_NAME: hiveserver2
      HIVE_METASTORE_URI: thrift://hive-metastore:9083
      HADOOP_HOME: /opt/hadoop
    ports:
      - "10000:10000"  # HiveServer2 Thrift (beeline / PyHive)
      - "10002:10002"  # HiveServer2 Web UI
    volumes:
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro

  # ── Kafka ─────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: homepedia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: homepedia-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: homepedia-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: homepedia
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

volumes:
  namenode_data:
  datanode_data:
  hive_metastore_data:
