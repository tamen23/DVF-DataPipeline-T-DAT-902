services:

  # ── Hadoop HDFS ──────────────────────────────────────────────────
  namenode:
    image: apache/hadoop:3.3.6
    container_name: homepedia-namenode
    hostname: namenode
    user: root
    command: >
      bash -c "
        mkdir -p /opt/hadoop/data/namenode &&
        chmod 755 /opt/hadoop/data/namenode &&
        if [ ! -f /opt/hadoop/data/namenode/current/VERSION ]; then
          echo 'Formatting namenode...' &&
          hdfs namenode -format -force -nonInteractive;
        fi &&
        hdfs namenode
      "
    environment:
      CLUSTER_NAME: homepedia
      HADOOP_HOME: /opt/hadoop
      JAVA_HOME: /usr/lib/jvm/java-1.8.0-openjdk-1.8.0.212.b04-0.el7_6.x86_64/jre
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - namenode_data:/opt/hadoop/data/namenode
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro
    healthcheck:
      test: ["CMD-SHELL", "hdfs dfsadmin -report 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10

  datanode:
    image: apache/hadoop:3.3.6
    container_name: homepedia-datanode
    hostname: datanode
    user: root
    command: >
      bash -c "
        mkdir -p /opt/hadoop/data/datanode &&
        chmod 755 /opt/hadoop/data/datanode &&
        hdfs datanode
      "
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      HADOOP_HOME: /opt/hadoop
      JAVA_HOME: /usr/lib/jvm/java-1.8.0-openjdk-1.8.0.212.b04-0.el7_6.x86_64/jre
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/opt/hadoop/data/datanode
      - ./hadoop/config:/opt/hadoop/etc/hadoop:ro

  # ── Hive ─────────────────────────────────────────────────────────
  hive-metastore-db:
    image: postgres:13-alpine
    container_name: homepedia-hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - hive_metastore_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: homepedia-hive-metastore
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    env_file:
      - ./hadoop/config/hadoop-hive.env
    command: /opt/hive/bin/hive --service metastore
    ports:
      - "9083:9083"

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: homepedia-hive-server
    depends_on:
      - hive-metastore
    env_file:
      - ./hadoop/config/hadoop-hive.env
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore-db/metastore"
      SERVICE_PRECONDITION: "hive-metastore:9083"
    ports:
      - "10000:10000"
      - "10002:10002"

  # ── PostgreSQL (schema.sql / dbt models) ────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: homepedia-postgres
    environment:
      POSTGRES_DB: homepedia
      POSTGRES_USER: homepedia
      POSTGRES_PASSWORD: homepedia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homepedia -d homepedia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: homepedia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: homepedia-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: containers reach the broker at kafka:29092,
      # the host (producers/consumers run locally) at localhost:9092.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: homepedia-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: homepedia
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

volumes:
  namenode_data:
  datanode_data:
  hive_metastore_data:
  postgres_data:
